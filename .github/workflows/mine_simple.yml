name: Mine Simple

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-mining.txt
      - run: python scripts/mining/mine_jaxfixbench.py manifest --out-dir data/mined
