name: Mine JAXFixBench Sources

on:
  workflow_dispatch:
  schedule:
    - cron: "17 2 * * 0"

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: .cache/jaxfixbench
          key: jaxfixbench-seen-${{ github.run_number }}
          restore-keys: |
            jaxfixbench-seen-

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m pip install -r requirements-mining.txt

      - name: Rolling repo discovery
        run: |
          python scripts/mining/rolling_discover.py \
            --out-dir data/mined \
            --seen-file .cache/jaxfixbench/seen_repos.json \
            --target-per-bucket 50 \
            --max-pages-per-query 2 \
            --run-offset ${{ github.run_number }} \
            --fallback-to-seen

      - run: python scripts/mining/mine_jaxfixbench.py plan --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py clone --out-dir data/mined --max-clones 60
      - run: python scripts/mining/mine_jaxfixbench.py extract --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py score --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py patterns --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py mutations --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py validate --out-dir data/mined
      - run: python scripts/mining/build_finetune_dataset.py --out-dir data/mined --sft-dir data/sft --max-per-signature 16
      - run: rm -rf data/mined/public_repos
      - run: python scripts/mining/mine_jaxfixbench.py manifest --out-dir data/mined

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jaxfixbench-clean-sft
          path: |
            data/mined/*.json
            data/mined/*.jsonl
            data/sft/**
          if-no-files-found: warn
          retention-days: 14
