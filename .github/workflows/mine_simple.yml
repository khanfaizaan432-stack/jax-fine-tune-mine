name: Mine JAXFixBench Sources

on:
  workflow_dispatch:

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -r requirements-mining.txt
      - run: python scripts/mining/mine_jaxfixbench.py discover --out-dir data/mined --target-per-bucket 50 --max-pages-per-query 2
      - run: python scripts/mining/mine_jaxfixbench.py plan --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py clone --out-dir data/mined --max-clones 60
      - run: python scripts/mining/mine_jaxfixbench.py extract --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py score --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py patterns --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py mutations --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py validate --out-dir data/mined
      - run: python scripts/mining/mine_jaxfixbench.py manifest --out-dir data/mined
